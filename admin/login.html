<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Naufal Studio Gaming</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>
<body>

  <div class="admin-login-container">
    <div class="login-card">
      <h2 style="margin-bottom: 5px;">Naufal Studio</h2>
      <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 14px;">Masuk ke Panel Admin</p>
      
      <form id="loginForm">
        <div class="form-group" style="text-align: left;">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="admin@naufalstudio.com" required>
        </div>
        
        <div class="form-group" style="text-align: left;">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
        </div>
        
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 12px; font-size: 16px;">
          Login
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
